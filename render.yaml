services:
  - type: web
    name: resume-analyzer-ai
    env: python
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: GEMINI_API_KEY
        sync: true

  - type: web
    name: resume-analyzer-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: true
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: resume-analyzer-ai
          property: host
      - key: JWT_SECRET
        generateValue: true
